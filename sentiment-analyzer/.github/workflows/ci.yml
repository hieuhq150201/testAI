name: CI — Sentiment Analyzer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentiment-analyzer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies (giống production)
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True)"

      - name: Smoke test
        run: python smoke_test.py

      - name: Train model nếu chưa có
        run: |
          if [ ! -f models/best_model_v2.pkl ]; then
            pip install datasets
            python src/train.py
          fi

      - name: Unit tests
        run: python -m pytest tests/test_unit.py tests/test_imports.py -v --tb=short

      - name: Integration tests
        run: python -m pytest tests/test_integration.py -v --tb=short

      - name: Full suite + coverage
        run: |
          python -m pytest tests/ --ignore=tests/load_test.py \
            --cov=api --cov=src \
            --cov-report=term-missing \
            --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: sentiment-analyzer/coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentiment-analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install flake8
      - name: Lint
        run: flake8 api/ src/ --max-line-length=120 --ignore=E501,W503 || true

  docker-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentiment-analyzer
    steps:
      - uses: actions/checkout@v4
      - name: Verify Dockerfile không có artifact
        run: |
          if grep -rn ">>>" Dockerfile Dockerfile.dashboard frontend/Dockerfile 2>/dev/null; then
            echo "FAIL: Python interactive shell artifact in Dockerfile"
            exit 1
          fi
          echo "OK: Dockerfiles clean"
      - name: Verify requirements.txt
        run: |
          count=$(grep -c "==" requirements.txt || true)
          [ "$count" -ge 10 ] || (echo "FAIL: Too few packages ($count)" && exit 1)
          echo "OK: $count packages"
