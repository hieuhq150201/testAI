version: "3.9"

services:
  sentiment-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentiment-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data      # persist SQLite DB
      - ./models:/app/models  # persist models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  sentiment-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: sentiment-dashboard
    ports:
      - "8501:8501"
    depends_on:
      sentiment-api:
        condition: service_healthy
    environment:
      - API_URL=http://sentiment-api:8000
    restart: unless-stopped

  sentiment-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentiment-frontend
    ports:
      - "3000:3000"
    depends_on:
      sentiment-api:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped

